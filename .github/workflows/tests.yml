name: tests

# Runs on GitHub's servers AFTER code arrives there:
#   * every push to any branch
#   * every pull request targeting main
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Pin the interpreter so we always land on a Python with prebuilt
      # pygame-ce wheels (project allows >=3.12).
      UV_PYTHON: "3.12"
      # Headless SDL so pygame.init() (via SpatialGrid's Rect construction)
      # works with no display.
      SDL_VIDEODRIVER: dummy
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run tests
        run: uv run --group dev pytest -q
